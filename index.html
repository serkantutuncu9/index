<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetim Paneli - Veri Girişi</title>
    <style>
        /* Temel Sıfırlama ve Mat Koyu Tema Renkleri */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1a1c1e;
            color: #e2e8f0;
            display: flex;
            min-height: 100vh;
        }

        /* Yan Menü (Sidebar) */
        .sidebar {
            width: 260px;
            background-color: #111315;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2d3135;
        }

        .sidebar h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #94a3b8;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .sidebar a {
            color: #94a3b8;
            text-decoration: none;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .sidebar a:hover, .sidebar a.active {
            background-color: #1e293b;
            color: #f8fafc;
        }

        /* Ana İçerik Alanı */
        .main-content {
            flex: 1;
            padding: 3rem;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 2.5rem;
            border-bottom: 1px solid #2d3135;
            padding-bottom: 1rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 500;
            color: #f1f5f9;
        }

        /* Form Kartı Yapısı */
        .form-container {
            background-color: #22252a;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            border: 1px solid #2d3135;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            color: #94a3b8;
            font-weight: 500;
        }

        /* Mat ve Şık Input Tasarımları */
        input[type="text"],
        input[type="date"],
        select,
        textarea {
            background-color: #1a1c1e;
            border: 1px solid #3a3f44;
            color: #f8fafc;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #475569;
            box-shadow: 0 0 0 2px rgba(71, 85, 105, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Buton Tasarımı */
        .btn-container {
            margin-top: 2rem;
            display: flex;
            justify-content: flex-end;
        }

        .btn-submit {
            background-color: #334155;
            color: #f8fafc;
            border: none;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn-submit:hover {
            background-color: #475569;
        }

        /* Bildirim Mesajları */
        .alert {
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 6px;
            display: none;
            font-size: 0.95rem;
        }

        .alert-success {
            background-color: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        /* Duyarlılık (Responsive) */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #2d3135;
            }
            .main-content {
                padding: 1.5rem;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <!-- Yan Menü -->
    <div class="sidebar">
        <h2>Panel</h2>
        <a href="#" class="active">Veri Girişi</a>
        <a href="#">İçerik Listesi</a>
        <a href="#">Ayarlar</a>
    </div>

    <!-- Ana İçerik -->
    <div class="main-content">
        <div class="header">
            <h1>Yeni İçerik Ekle</h1>
        </div>

        <!-- Başarı Mesajı -->
        <div id="successAlert" class="alert alert-success">
            Veri başarıyla kaydedildi!
        </div>

        <!-- Form Kartı -->
        <div class="form-container">
            <form id="dataForm" onsubmit="handleSubmit(event)">
                <div class="form-grid">
                    
                    <div class="form-group">
                        <label for="contentTitle">Başlık</label>
                        <input type="text" id="contentTitle" required placeholder="İçerik başlığını giriniz...">
                    </div>

                    <div class="form-group">
                        <label for="contentCategory">Kategori</label>
                        <select id="contentCategory" required>
                            <option value="" disabled selected>Seçiniz...</option>
                            <option value="genel">Genel</option>
                            <option value="Proje">Projeler</option>
                            <option value="Gezi">Gezi Notları</option>
                            <option value="Teknoloji">Teknoloji</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="contentDate">Yayın Tarihi</label>
                        <input type="date" id="contentDate" required>
                    </div>

                    <div class="form-group">
                        <label for="contentAuthor">Yazar / Kaynak</label>
                        <input type="text" id="contentAuthor" placeholder="Ad soyad veya kaynak...">
                    </div>

                    <div class="form-group full-width">
                        <label for="contentDescription">İçerik Detayı</label>
                        <textarea id="contentDescription" placeholder="Detaylı açıklamayı buraya yazınız..."></textarea>
                    </div>

                </div>

                <div class="btn-container">
                    <button type="submit" class="btn-submit">Kaydet</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Sayfa yüklendiğinde bugünün tarihini otomatik ata
        document.getElementById('contentDate').valueAsDate = new Date();

        function handleSubmit(event) {
            event.preventDefault(); // Sayfanın yeniden yüklenmesini engeller

            // Form verilerini yakalama
            const formData = {
                title: document.getElementById('contentTitle').value,
                category: document.getElementById('contentCategory').value,
                date: document.getElementById('contentDate').value,
                author: document.getElementById('contentAuthor').value,
                description: document.getElementById('contentDescription').value
            };

            // Konsolda verileri kontrol etmek için
            console.log("Gönderilen Veriler:", formData);

            /* 
               Buraya veritabanı veya API bağlantı kodları gelecek.
               Örneğin Google Apps Script kullanıyorsanız:
               google.script.run.withSuccessHandler(function() { ... }).veriyiKaydet(formData);
            */

            // Başarı mesajını göster
            const alertBox = document.getElementById('successAlert');
            alertBox.style.display = 'block';

            // Formu temizle
            document.getElementById('dataForm').reset();
            document.getElementById('contentDate').valueAsDate = new Date();

            // 3 saniye sonra mesajı gizle
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
