<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TÜRKİYE STEM YARIŞMASI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --navy: #1a237e;
            --purple: #4a148c;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* --- Responsive Header --- */
        header {
            height: 40vh;
            min-height: 280px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f8f9fa;
            overflow: hidden;
            border-bottom: 1px solid rgba(26, 35, 126, 0.1);
            padding: 10px;
        }

        #dnaCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.35;
        }

        .header-content {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
        }

        /* --- Kelime Bölünmesini Engelleyen Başlık --- */
        .main-title {
            display: flex;
            flex-wrap: wrap; /* Kelimeler sığmazsa kelime bütünlüğünü bozmadan alt satıra geçer */
            justify-content: center;
            row-gap: 10px;
            column-gap: 15px; /* Kelimeler arası boşluk */
            max-width: 100%;
            margin: 0 auto;
        }

        .word {
            display: flex;
            white-space: nowrap; /* Kelimenin içindeki harflerin bölünmesini engeller */
        }

        .main-title span {
            display: inline-block;
            font-size: clamp(1.4rem, 6vw, 3.5rem); /* Mobilde daha esnek font boyutu */
            font-weight: 900;
            text-transform: uppercase;
            color: var(--navy);
            -webkit-text-stroke: 1px transparent;
            background: linear-gradient(to bottom, #ff8c00, #ff1493, #8a2be2);
            -webkit-background-clip: text;
            background-clip: text;
            animation: mexicoWave 3s ease-in-out infinite;
        }

        @keyframes mexicoWave {
            0%, 40%, 100% { transform: translateY(0) scale(1); }
            20% { 
                transform: translateY(-8px) scale(1.1);
                filter: drop-shadow(0 5px 10px rgba(255, 20, 147, 0.3));
            }
        }

        .sub-title {
            color: var(--navy);
            letter-spacing: 3px;
            font-size: clamp(0.65rem, 2vw, 0.9rem);
            margin-top: 25px;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0.8;
        }

        /* --- Navigasyon --- */
        nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 5px;
            display: flex;
            justify-content: center;
            gap: clamp(10px, 4vw, 40px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(26, 35, 126, 0.1);
        }

        nav a {
            color: #2d3436;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 700;
            font-size: clamp(0.6rem, 2.5vw, 0.8rem);
            cursor: pointer;
        }

        /* --- İçerik --- */
        .section { display: none; padding: 40px 15px; max-width: 1100px; margin: auto; }
        .section.active { display: block; animation: fadeInUp 0.6s ease; }

        .event-box {
            display: grid;
            grid-template-columns: 120px 1fr;
            background: #fdfdfd;
            margin-bottom: 20px;
            border-radius: 20px;
            border: 1px solid rgba(26, 35, 126, 0.05);
            overflow: hidden;
        }

        .event-visual {
            background: linear-gradient(135deg, rgba(26,35,126,0.03), rgba(74,20,140,0.03));
            display: flex; justify-content: center; align-items: center;
            font-size: 2.5rem; color: var(--navy);
        }

        .event-info { padding: 25px; }
        .event-info h3 { color: var(--navy); margin-bottom: 10px; }

        @media (max-width: 768px) {
            .event-box { grid-template-columns: 1fr; text-align: center; }
            .event-visual { padding: 20px 0; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<header>
    <canvas id="dnaCanvas"></canvas>
    <div class="header-content">
        <h1 class="main-title" id="waveTitle">TÜRKİYE STEM YARIŞMASI</h1>
        <p class="sub-title">MÜHENDİSLİK • STRATEJİ • GELECEK</p>
    </div>
</header>

<nav>
    <a onclick="showTab('home', this)" class="active">Kategoriler</a>
    <a onclick="showTab('kayit', this)">Başvuru</a>
    <a onclick="showTab('sonuclar', this)">Sonuçlar</a>
</nav>

<div id="home" class="section active">
    <!-- Mini Sumo -->
    <div class="event-box">
        <div class="event-visual"><i class="fas fa-robot"></i></div>
        <div class="event-info">
            <h3>MİNİ SUMO</h3>
            <p style="color: var(--purple); font-style: italic; margin-bottom: 10px; font-size: 0.9rem;">"Ringin tozunu yutmaya hazır mısınız?"</p>
            <ul style="list-style-position: inside; color: #555; font-size: 0.9rem; line-height: 1.6;">
                <li>Eleme usulü turnuva sistemi.</li>
                <li>Robot ağırlık ve boyut kısıtları.</li>
                <li>Otonom zeka mücadelesi.</li>
            </ul>
        </div>
    </div>
    <!-- Diğer kategoriler aynı yapıda eklenebilir -->
</div>

<div id="kayit" class="section">
    <iframe src="FORM_URL" style="width:100%; height:800px; border:none;"></iframe>
</div>

<div id="sonuclar" class="section">
    <iframe src="SKOR_URL" style="width:100%; height:800px; border:none;"></iframe>
</div>

<script>
    // Başlığı Kelimelere ve Harflere Ayır (Meksika Dalgası + Bölünme Engeli)
    const titleEl = document.getElementById('waveTitle');
    const words = titleEl.innerText.split(' ');
    titleEl.innerHTML = '';
    
    let charIndex = 0;
    words.forEach((wordText) => {
        const wordSpan = document.createElement('span');
        wordSpan.className = 'word';
        
        [...wordText].forEach((char) => {
            const charSpan = document.createElement('span');
            charSpan.innerText = char;
            charSpan.style.animationDelay = `${charIndex * 0.1}s`;
            wordSpan.appendChild(charSpan);
            charIndex++;
        });
        
        titleEl.appendChild(wordSpan);
    });

    function showTab(tabId, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
        window.scrollTo({ top: 200, behavior: 'smooth' });
    }

    // DNA Animasyonu
    const canvas = document.getElementById('dnaCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, tick = 0;

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function draw() {
        ctx.clearRect(0, 0, width, height);
        tick += 0.015;
        const count = width < 600 ? 18 : 35;
        const spacing = width / count;
        for (let i = 0; i < count; i++) {
            const x = i * spacing + (spacing/2);
            const y1 = height / 2 + Math.sin(tick + i * 0.2) * 40;
            const y2 = height / 2 + Math.sin(tick + i * 0.2 + Math.PI) * 40;
            ctx.beginPath(); ctx.moveTo(x, y1); ctx.lineTo(x, y2);
            ctx.strokeStyle = 'rgba(74, 20, 140, 0.1)'; ctx.stroke();
            ctx.fillStyle = '#1a237e'; ctx.beginPath(); ctx.arc(x, y1, 2.5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#4a148c'; ctx.beginPath(); ctx.arc(x, y2, 2.5, 0, Math.PI*2); ctx.fill();
        }
        requestAnimationFrame(draw);
    }
    draw();
</script>

</body>
</html>
